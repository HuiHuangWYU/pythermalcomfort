name: Test and publish to TestPyPI

on:
    push:
        branches:
            - development
        tags:
            - "v*rc*"

permissions:
    contents: read

jobs:
    test:
        runs-on: ubuntu-latest
        strategy:
            matrix:
                python-version: [ "3.10", "3.14" ]
                platform: [ ubuntu-latest ]
        steps:
            -   uses: actions/checkout@v6.0.2
            -   name: Set up Python
                uses: actions/setup-python@v6.2.0
                with:
                    python-version: ${{ matrix.python-version }}
            -   name: Install dependencies
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install setuptools
                    python -m pip install "tox<4" tox-gh-actions
                    python -m pip install ruff
            -   name: Lint
                run: ruff check ./pythermalcomfort ./tests
            -   name: Check formatting
                run: ruff format --check ./pythermalcomfort ./tests
            -   name: Run Tox
                run: tox
                env:
                    PLATFORM: ${{ matrix.platform }}

    deploy-testpypi:
        if: startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'rc')
        needs: test
        runs-on: ubuntu-latest
        permissions:
            id-token: write
            contents: read
        steps:
            -   uses: actions/checkout@v6.0.2
                with:
                    fetch-depth: 0
            -   name: Set up Python
                uses: actions/setup-python@v6.2.0
                with:
                    python-version: "3.11"
            -   name: Ensure tag commit is on development
                run: |
                    git fetch origin development
                    git merge-base --is-ancestor "$GITHUB_SHA" "origin/development"
            -   name: Install build dependencies
                run: |
                    python -m pip install --upgrade pip
                    python -m pip install build
            -   name: Build distribution packages
                run: python -m build
            -   name: Publish to TestPyPI
                uses: pypa/gh-action-pypi-publish@release/v1
                with:
                    repository-url: https://test.pypi.org/legacy/
